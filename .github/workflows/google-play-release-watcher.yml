name: Check Google Play Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  actions: write
  contents: read

concurrency:
  group: google-play-release-watcher
  cancel-in-progress: false

jobs:
  detect:
    name: Detect Google Play track updates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GOOGLE_PLAY_PACKAGE_NAME: com.zarathu.seil
      # Default closed testing track is alpha; add custom track names here if needed.
      GOOGLE_PLAY_TRACKS: production,alpha
      PLAY_RELEASE_STATE_PATH: .github/state/google-play-release-state.json
      NOTIFY_ON_FIRST_RUN: "false"
      NOTIFICATION_WORKFLOW_FILE: google-play-release-notification.yml

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore previous Play snapshot
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.PLAY_RELEASE_STATE_PATH }}
          key: google-play-release-state-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            google-play-release-state-

      - name: Detect release updates
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/detect-google-play-release.mjs

      - name: Save Play snapshot
        if: success()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.PLAY_RELEASE_STATE_PATH }}
          key: google-play-release-state-${{ github.run_id }}-${{ github.run_attempt }}
